<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة مناسف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="https://c.top4top.io/p_37838ly851.png" alt="لوجو" class="admin-logo">
                <div class="text-3d" style="font-size: 26px;">مناسف</div>
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active" onclick="window.switchTab('products', this)"><i class="fas fa-utensils"></i> إدارة القائمة</a>
                <a href="#" class="menu-item" onclick="window.switchTab('orders', this)"><i class="fas fa-clipboard-list"></i> طلبات الزبائن</a>
            </nav>
        </aside>

        <main class="main-content">
            <div id="products-tab" class="tab-content active">
                <div class="card">
                    <h3><i class="fas fa-plus-circle"></i> إضافة صنف جديد (منسف/وجبة)</h3>
                    <form id="add-product-form" class="admin-form">
                        <div class="form-group">
                            <label>اسم الوجبة</label>
                            <input type="text" id="p-name" required placeholder="مثال: منسف لحم بلدي">
                        </div>
                        <div class="form-group">
                            <label>سعر الوجبة ($)</label>
                            <input type="number" step="0.01" id="p-price" required placeholder="أدخل السعر">
                        </div>
                        <div class="form-group">
                            <label>صورة الوجبة (يتم ضغطها تلقائياً)</label>
                            <input type="file" id="p-image" accept="image/*" required class="file-input">
                            <div class="preview-container" id="preview-container" style="display: none;">
                                <img id="image-preview" src="" alt="معاينة">
                            </div>
                        </div>
                        <div id="upload-status" class="status-msg"></div>
                        <button type="submit" id="submit-btn" class="btn-primary">حفظ في القائمة <i class="fas fa-cloud-upload-alt"></i></button>
                    </form>
                </div>

                <div class="card mt-20">
                    <h3><i class="fas fa-list"></i> القائمة الحالية</h3>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>التاريخ</th><th>إجراء</th></tr></thead>
                            <tbody id="products-list">
                                <tr><td colspan="5" style="text-align:center;">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="orders-tab" class="tab-content">
                <div class="card">
                    <h3><i class="fas fa-bell"></i> أحدث طلبات التوصيل</h3>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead><tr><th>رقم الطلب</th><th>الزبون</th><th>الهاتف</th><th>العنوان</th><th>الأصناف المطلوبة</th><th>الإجمالي</th><th>التاريخ</th></tr></thead>
                            <tbody id="orders-list">
                                <tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
