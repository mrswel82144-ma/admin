<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مناسف</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <i class="fas fa-lock" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="margin-bottom: 15px;">تسجيل الدخول للإدارة</h2>
            <input type="password" id="admin-pin" placeholder="أدخل الرمز..." style="text-align: center; font-size: 20px; letter-spacing: 5px; outline: none;">
            <button class="btn-save mt-15" onclick="checkPin()">دخول</button>
        </div>
    </div>

    <div id="admin-main-content" style="display: none;">
        <main class="admin-content">
            <section id="products-tab" class="tab-content active">
                <div class="header-section">
                    <h2>المنتجات المحفوظة</h2>
                    <button class="btn-add" onclick="showForm('product-form')"><i class="fas fa-plus"></i> إضافة منتج جديد</button>
                </div>
                <div id="product-list" class="list-container"></div>
            </section>

            <section id="categories-tab" class="tab-content">
                <div class="header-section">
                    <h2>الأقسام المحفوظة</h2>
                    <button class="btn-add" onclick="showForm('category-form')"><i class="fas fa-folder-plus"></i> إضافة قسم جديد</button>
                </div>
                <div id="category-list" class="grid-container"></div>
            </section>

            <section id="banners-tab" class="tab-content">
                <div class="header-section">
                    <h2>البنرات المرفوعة (16:9)</h2>
                    <button class="btn-add" onclick="showForm('banner-form')"><i class="fas fa-image"></i> إضافة إعلان جديد</button>
                </div>
                <div id="banner-list" class="banners-grid"></div>
            </section>

            <section id="orders-tab" class="tab-content">
                <div class="orders-nav">
                    <button class="order-nav-btn active" id="btn-pending" onclick="filterOrders('pending')">الطلبات المعلقة</button>
                    <button class="order-nav-btn" id="btn-completed" onclick="filterOrders('completed')">الطلبات المنتهية</button>
                </div>
                <div id="orders-list" class="list-container mt-15"></div>
            </section>

            <section id="settings-tab" class="tab-content">
                <div class="card">
                    <h3><i class="fas fa-truck"></i> سعر التوصيل</h3>
                    <div class="form-group" style="width: 100%;">
                        <label style="display:block; margin-bottom:10px;">سعر التوصيل (دينار عراقي)</label>
                        <input type="number" id="delivery-price-input" placeholder="مثال: 5000">
                        <button class="btn-save mt-15" onclick="saveDeliveryPrice()">حفظ السعر</button>
                    </div>
                </div>
            </section>
        </main>

        <div id="modal-overlay" class="modal-overlay">
            <form id="product-form" class="modal-card">
                <h3>إضافة منتج</h3>
                <input type="text" id="p-name" placeholder="اسم المنتج" required>
                <select id="p-category" required><option value="">اختر القسم</option></select>
                <textarea id="p-desc" placeholder="وصف المنتج" required></textarea>
                <input type="number" id="p-price" placeholder="السعر بدينار العراقي (بدون فواصل)" required>
                <label class="file-label">رفع صورة (مربعة 1:1) <input type="file" id="p-img" accept="image/*" required></label>
                <button type="submit" class="btn-confirm">حفظ المنتج</button>
                <button type="button" class="btn-cancel" onclick="closeForm()">إلغاء</button>
            </form>

            <form id="category-form" class="modal-card">
                <h3>إضافة قسم</h3>
                <input type="text" id="c-name" placeholder="اسم القسم" required>
                <label class="file-label">رفع صورة (مربعة 1:1) <input type="file" id="c-img" accept="image/*" required></label>
                <button type="submit" class="btn-confirm">حفظ القسم</button>
                <button type="button" class="btn-cancel" onclick="closeForm()">إلغاء</button>
            </form>

            <form id="banner-form" class="modal-card">
                <h3>إضافة بنر إعلاني</h3>
                <label class="file-label">رفع إعلان (مستطيل 16:9) <input type="file" id="b-img" accept="image/*" required></label>
                <button type="submit" class="btn-confirm">رفع الإعلان</button>
                <button type="button" class="btn-cancel" onclick="closeForm()">إلغاء</button>
            </form>
        </div>

        <div id="pwa-modal-admin" class="modal-overlay" style="display:none; z-index: 10000;">
            <div class="modal-card" style="text-align: center; display: flex;">
                <img src="./icon-192x192.png" style="width: 80px; height: 80px; margin: 0 auto; border-radius: 15px;">
                <h3 style="margin-top: 15px;">تثبيت لوحة الإدارة</h3>
                <p style="color: #64748b; font-size: 14px; margin-bottom: 15px;">قم بتثبيت الإدارة كـ تطبيق لسهولة وسرعة الوصول!</p>
                <button class="btn-confirm w-100" style="width: 100%;" onclick="installPWA()">تثبيت التطبيق</button>
                <button class="btn-cancel w-100 mt-15" style="width: 100%;" onclick="skipPWA()">تخطي</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button onclick="switchTab('products', this)" class="active"><i class="fas fa-box"></i><span>المنتجات</span></button>
            <button onclick="switchTab('categories', this)"><i class="fas fa-th-large"></i><span>الأقسام</span></button>
            <button onclick="switchTab('banners', this)"><i class="fas fa-image"></i><span>البنرات</span></button>
            <button onclick="switchTab('orders', this)"><i class="fas fa-clipboard-list"></i><span>الطلبات</span></button>
            <button onclick="switchTab('settings', this)"><i class="fas fa-truck"></i><span>التوصيل</span></button>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
